map: 
  name: "17_512.png"
  dir: "Maps/generated_maps/multi_bottleneck"
  size: [512, 512]
  res: &map_res 1
  test_cases:
    case1:
      start: [41, 141]
      goal: [475, 463]
experiment_info_default:
  resolution: 20.0
  epsilon: [20, 20] # x, y tolerance for goal region (2D simple)
  backward_epsilon: [20, 20] # goal region for backward search (BiIGHAStar)
  LCR: [20, 20] # local controllability radius for BiIGHAStar (2D simple)
  tolerance: 0.01
  max_level: 5
  division_factor: 2
  max_expansions: 100000
  hysteresis: 1000
  near_meet_config: # configuration for BiIGHAStar near-meet validation
    num_interpolation_points: 0 # number of interpolation points for validity check
    num_perturbations: 0 # number of perturbations per interpolation point
    perturbation_scale: 1.0 # scale factor for perturbations
  goal_sampling_config: # configuration for backward search goal region sampling
    enabled: true # whether to sample around goal for backward search
    space_type: "R_N" # "R_N" for Euclidean (no angular dimensions)
    angular_dims: [] # no angular dimensions for simple 2D
    num_samples: 32 # number of samples to generate
    # sigma defaults to LCR if not specified
  node_info:
    node_type: "simple"
    step_size: 25.0
    n_succ: 8
    timesteps: 20
    map_res: *map_res