experiment_info_default:
  resolution: 4.0 # starting resolution used for discretization.
  epsilon: [2.0, 2.0, 0.2, 5.0] # ate, cte, heading, velocity for goal region (4D)
  backward_epsilon: [2.0, 2.0, 0.2, 5.0] # goal region for backward search (BiIGHAStar)
  LCR: [1.5, 1.5, 0.2, 5.0] # local controllability radius for BiIGHAStar (4D)
  tolerance: 0.5 # Your perception (map) resolution should be at least this.
  max_level: 5 # maximum level to which you expect the system to go; we use this to cache the hash values.
  division_factor: 2  # factor by which the resolution increases every level.
  max_expansions: 100000 # maximum number of expansions allowed.
  hysteresis: 20000 # hysteresis threshold for for IGHA*-H
  preemptive_expansion: # optional GPU batching of successor expansions (IGHAStar)
    enabled: true # when true, expand several Q_v vertices per GPU kernel launch
    min_preemptive: 50 # only batch once the stash holds at least this many vertices
    max_preemptive: 100 # hardware cap: max vertices expanded per batched launch
  near_meet_config: # configuration for BiIGHAStar near-meet validation
    num_interpolation_points: 0 # number of interpolation points for validity check
    num_perturbations: 0 # number of perturbations per interpolation point
    perturbation_scale: 1.0 # scale factor for perturbations
  goal_sampling_config: # configuration for backward search goal region sampling
    enabled: true # whether to sample around goal for backward search
    space_type: "SE2" # "SE2" for manifold with rotation, "R_N" for Euclidean
    angular_dims: [2] # which dimensions are angular (dimension 2 = theta for kinematic)
    num_samples: 32 # number of samples to generate
    # sigma defaults to LCR if not specified
  node_info:
    node_type: "kinematic"
    length: 2.6
    width: 1.6
    map_res: *map_res
    dt: 0.05
    timesteps: 10
    step_size: 1.0
    steering_list: [-25.0, -10.0, 0.0, 10.0, 25.0] # in degrees.
    throttle_list: [-5.0, 5.0]
    del_theta: 90.0 # in degrees
    max_theta: 30.0 # in degrees
    # the following parameters are not used in kinematic planning, they're here for compatibility/may be removed.
    del_vel: 2.5
    RI: 0.8
    max_vert_acc: 3.0
    min_vel: -10.0
    max_vel:  10.0
    gear_switch_time: 0.0 # multiply the distance in the reverse direction